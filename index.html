function logAct(type,detail){
  if(!cu) return;
  db.actLogs.unshift({id:Date.now(),ts:nowStr(),type,detail,by:cu.name,role:ROLE_LBL[cu.role]||cu.role});
  if(db.actLogs.length>300) db.actLogs=db.actLogs.slice(0,300);
  saveTab('actLogs');
}
function getStatus(d){
  const diff=(new Date(d.expire)-new Date())/864e5;
  if(diff<0) return 'expire'; if(diff<90) return 'warn'; if(+d.boxes<=3) return 'low'; return 'ok';
}
function sBadge(d){
  const s=getStatus(d);
  if(s==='expire') return `<span class="badge b-exp">${I.expire}หมดอายุ</span>`;
  if(s==='warn')   return `<span class="badge b-warn">${I.warn}ใกล้หมดอายุ</span>`;
  if(s==='low')    return `<span class="badge b-low">${I.low}สต็อกต่ำ</span>`;
  return `<span class="badge b-ok">${I.check}ปกติ</span>`;
}

function toast(msg,ok=true){
  const t=document.getElementById('toast'); t.style.background=ok?'var(--gd)':'#c0202a';
  document.getElementById('tmsg').textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function chLbl(ch,det){ return det?`${CH_LBL[ch]||ch} (${det})`:CH_LBL[ch]||ch; }
function getAlerts(){
  return db.drugs.flatMap(d=>{
    const s=getStatus(d);
    if(s==='expire') return [{d,msg:`${d.generic} — หมดอายุแล้ว (${thD(d.expire)})`,cls:'a-expire',icon:'expire'}];
    if(s==='warn')   return [{d,msg:`${d.generic} — หมดอายุใน 90 วัน`,cls:'a-warn',icon:'warn'}];
    if(s==='low')    return [{d,msg:`${d.generic} — สต็อกต่ำ เหลือ ${d.boxes} กล่อง`,cls:'a-low',icon:'low'}];
    return [];
  });
}

/* GOOGLE SHEETS SYNC */
function setSyncStatus(s){
  const dot=document.getElementById('sync-dot'), lbl=document.getElementById('sync-lbl');
  if(!dot) return;
  dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  if(lbl) lbl.textContent=s==='syncing'?'กำลังบันทึก...':s==='error'?'บันทึกไม่สำเร็จ':'ซิงค์แล้ว';
}
function rowsToObjs(rows,keys){
  if(!rows||rows.length<2) return [];
  return rows.slice(1).map(r=>{
    const o={};
    keys.forEach((k,i)=>{ o[k]= r[i]!==undefined? r[i]:''; });
    NUM_KEYS.forEach(k=>{ if(o[k]!==undefined&&o[k]!=='') o[k]=Number(o[k])||0; });
    return o;
  });
}
function objsToRows(objs,keys){ return [keys,...objs.map(o=>keys.map(k=>o[k]!==undefined?o[k]:''))]; }

async function gasGet(tabName){
  const r=await fetch(`${GAS_URL}?tab=${tabName}`); return r.json();
}
async function gasPost(tabName,rows){
  const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({tab:tabName,action:'save_all',rows})});
  return r.json();
}
async function loadAll(){
  try{
    const [dr,lg,us,al]=await Promise.all([gasGet('drugs'),gasGet('logs'),gasGet('users'),gasGet('actLogs')]);
    db.drugs    = rowsToObjs(dr.data, DRUG_KEYS);
    db.logs     = rowsToObjs(lg.data, LOG_KEYS);
    db.users    = rowsToObjs(us.data, USER_KEYS);
    db.actLogs  = rowsToObjs(al.data, ALOG_KEYS);
    if(!db.users.length) db.users=DEFAULT_USERS;
    db.nId  = db.drugs.length   ? Math.max(...db.drugs.map(d=>+d.id))+1   : 1;
    db.nLId = db.logs.length    ? Math.max(...db.logs.map(l=>+l.id))+1    : 1;
    db.nUId = db.users.length   ? Math.max(...db.users.map(u=>+u.id))+1   : 5;
    return true;
  }catch(e){ console.error(e); return false; }
}
async function saveTab(tabName){
  setSyncStatus('syncing');
  const map={drugs:[db.drugs,DRUG_KEYS],logs:[db.logs,LOG_KEYS],users:[db.users,USER_KEYS],actLogs:[db.actLogs,ALOG_KEYS]};
  const [objs,keys]=map[tabName];
  const r=await gasPost(tabName,objsToRows(objs,keys));
  setSyncStatus(r?.ok?'ok':'error');
}

async function saveDrug(mode,id,forcedCat){
  const gen=(document.getElementById('dp-val')?.value||'').trim();
  if(!gen){alert('กรุณาเลือกหรือพิมพ์ชื่อยา');return;}
  const ch=document.getElementById('fch').value;
  const chObj=CHANNELS.find(c=>c.v===ch);
  const det=document.getElementById('fch-det')?.value.trim()||'';
  if(chObj?.nd&&!det){alert('กรุณาระบุรายละเอียดช่องทาง');return;}
  const dr={generic:gen,trade:document.getElementById('ftrade').value,company:document.getElementById('fcomp').value,lot:document.getElementById('flot').value,expire:document.getElementById('fexp').value,boxes:+document.getElementById('fboxes').value||0,strips:+document.getElementById('fstrips').value||0,tablets:+document.getElementById('ftabs').value||0,unit:document.getElementById('funit').value,category:forcedCat,channel:ch,channelDetail:det,receiveDate:document.getElementById('frecv').value,countDate:document.getElementById('fcnt').value,note:document.getElementById('fnote').value};
  if(mode==='add'){db.drugs.push({id:db.nId++,...dr});toast('เพิ่มรายการสำเร็จ');logAct('add',`เพิ่มยา: ${gen}`);}
  else{const idx=db.drugs.findIndex(x=>x.id==id);if(idx>-1)Object.assign(db.drugs[idx],dr);toast('บันทึกสำเร็จ');logAct('edit',`แก้ไขยา: ${gen}`);}
  closeModal(); await saveTab('drugs'); renderApp();
}

async function delDrug(id){
  if(!confirm('ต้องการลบรายการนี้?')) return;
  const d=findD(id);
  db.drugs=db.drugs.filter(x=>x.id!=id);
  closeModal(); toast('ลบรายการแล้ว'); logAct('del',`ลบยา: ${d?.generic||id}`);
  await saveTab('drugs'); renderApp();
}

async function saveCount(drugId){

async function saveLog(drugId,type){
  const date=document.getElementById('ldate').value, qty=+document.getElementById('lqty').value||0;
  const channel=document.getElementById('fch')?.value||'';
  const chObj=CHANNELS.find(c=>c.v===channel);
  const det=document.getElementById('fch-det')?.value.trim()||'';
  if(chObj?.nd&&!det){alert('กรุณาระบุรายละเอียดช่องทาง');return;}
  const by=document.getElementById('lby').value, note=document.getElementById('lnote').value;
  const dueDate=document.getElementById('ldue')?.value||'';
  const d=findD(drugId);
  const tlbl={receive:'รับยา',dispense:'เบิกยา',borrow:'ยืมยา'}[type];
  if(type==='receive'){d.boxes=+d.boxes+qty;d.receiveDate=date;}
  else if(type==='dispense'){d.boxes=Math.max(0,+d.boxes-qty);}
  else if(type==='borrow'){d.boxes=Math.max(0,+d.boxes-qty);}
  db.logs.push({id:db.nLId++,drugId,type,date,qty,qtyStr:`${qty} กล่อง`,channel,channelDetail:det,by:by||cu.name,note,returnedQty:0,dueDate});
  logAct(type,`${tlbl} ${d.generic} ${qty} กล่อง`);
  closeModal(); toast('บันทึกสำเร็จ');
  await Promise.all([saveTab('drugs'),saveTab('logs')]); renderApp();
}

function openUserModal(mode,id){
  const u=mode==='edit'?db.users.find(x=>x.id==id):{id:0,name:'',username:'',password:'',role:'pharmacist'};
  const rOpts=Object.keys(ROLE_LBL).map(k=>`<option value="${k}"${u.role===k?' selected':''}>${ROLE_LBL[k]}</option>`).join('');
  document.getElementById('modal').innerHTML=`<div class="mo" onclick="if(event.target===this)closeModal()"><div class="mb" style="max-width:400px">
    <div class="mh"><div class="mt">${I.users}${mode==='add'?'เพิ่มผู้ใช้ใหม่':'แก้ไขผู้ใช้'}</div><button class="mc" onclick="closeModal()">${I.close}</button></div>
    <div class="fg">
      <div class="f full"><label>${I.user} ชื่อ-สกุล</label><input id="un" value="${u.name}"></div>
      <div class="f"><label>ชื่อผู้ใช้</label><input id="uu" value="${u.username}"></div>
      <div class="f"><label>${I.key} รหัสผ่าน</label><input type="password" id="up" value="${u.password||''}" placeholder="${mode==='edit'?'เว้นว่างถ้าไม่เปลี่ยน':''}"></div>
      <div class="f full"><label>ระดับสิทธิ์</label><select id="ur">${rOpts}</select></div>
    </div>
    <div class="mfoot"><button class="btn" onclick="closeModal()">${I.close}ยกเลิก</button>
      <button class="btn pri" onclick="saveUser('${mode}',${id||0})">${I.check}บันทึก</button>
    </div>
  </div></div>`;
}
async function saveUser(mode,id){
  const name=document.getElementById('un').value.trim(),uname=document.getElementById('uu').value.trim();
  const pw=document.getElementById('up').value, role=document.getElementById('ur').value;
  if(!name||!uname){alert('กรุณากรอกชื่อและชื่อผู้ใช้');return;}
  if(mode==='add'){
    if(!pw){alert('กรุณากรอกรหัสผ่าน');return;}
    db.users.push({id:db.nUId++,name,username:uname,password:pw,role});
    toast('เพิ่มผู้ใช้สำเร็จ'); logAct('add',`เพิ่มผู้ใช้: ${name}`);
  }else{
    const idx=db.users.findIndex(x=>x.id==id);
    if(idx>-1){Object.assign(db.users[idx],{name,username:uname,role});if(pw)db.users[idx].password=pw;}
    toast('บันทึกสำเร็จ'); logAct('edit',`แก้ไขผู้ใช้: ${name}`);
  }
  closeModal(); await saveTab('users'); renderApp();
}
async function delUser(id){
  if(!confirm('ต้องการลบผู้ใช้นี้?')) return;
  const u=db.users.find(x=>x.id==id);
  db.users=db.users.filter(x=>x.id!=id);
  toast('ลบผู้ใช้แล้ว'); logAct('del',`ลบผู้ใช้: ${u?.name||id}`);
  await saveTab('users'); renderApp();
}

/* EXCEL */
function doExport(data,sheet,file){
  if(typeof XLSX==='undefined'){alert('ไลบรารี XLSX ยังโหลดไม่เสร็จ');return;}
  try{const ws=XLSX.utils.json_to_sheet(data),wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,sheet,ws);XLSX.writeFile(wb,file);toast('ส่งออก Excel สำเร็จ');}
  catch(e){alert('เกิดข้อผิดพลาด: '+e.message);}
}
function exportExcel(){doExport(db.drugs.map(d=>({'หมวดหมู่':CAT_LBL[d.category]||d.category,'ชื่อสามัญ':d.generic,'ชื่อทางการค้า':d.trade,'บริษัท':d.company,'เลขล็อต':d.lot,'วันหมดอายุ':d.expire,'สถานะ':{ok:'ปกติ',warn:'ใกล้หมดอายุ',expire:'หมดอายุ',low:'สต็อกต่ำ'}[getStatus(d)],'กล่อง':d.boxes,'แผง':d.strips,[`หน่วย(${d.unit})`]:d.tablets,'ช่องทาง':CH_LBL[d.channel]||d.channel,'รายละเอียดช่องทาง':d.channelDetail,'วันรับ':d.receiveDate,'วันนับ':d.countDate})),'สต็อก',`stock_${today()}.xlsx`);}
function exportLogsExcel(type){const lbl={receive:'รับยา',dispense:'เบิกยา'};doExport(db.logs.filter(l=>l.type===type).map(l=>{const d=findD(l.drugId);return{'วันที่':l.date,'หมวด':d?CAT_LBL[d.category]||d.category:'—','ชื่อยา':d?.generic||'—','จำนวน':l.qtyStr||l.qty,'ช่องทาง':CH_LBL[l.channel]||l.channel,'รายละเอียด':l.channelDetail||'','ผู้ดำเนินการ':l.by,'หมายเหตุ':l.note};}),lbl[type],`${type}_${today()}.xlsx`);}
function exportBorrowExcel(){doExport(db.logs.filter(l=>l.type==='borrow').map(l=>{const d=findD(l.drugId);return{'วันที่ยืม':l.date,'หมวด':d?CAT_LBL[d.category]||d.category:'—','ชื่อยา':d?.generic||'—','ยืม':l.qty,'คืนแล้ว':l.returnedQty||0,'ค้างคืน':+l.qty-(+l.returnedQty||0),'ช่องทาง':CH_LBL[l.channel]||l.channel,'กำหนดคืน':l.dueDate||'','ผู้ดำเนินการ':l.by};}),'ยืมยา',`borrow_${today()}.xlsx`);}
function exportCountExcel(){doExport(db.logs.filter(l=>l.type==='count').map(l=>{const d=findD(l.drugId);return{'วันที่นับ':l.date,'หมวด':d?CAT_LBL[d.category]||d.category:'—','ชื่อยา':d?.generic||'—','จำนวนที่นับ':l.qtyStr||l.qty,'ผู้นับ':l.by,'หมายเหตุ':l.note};}),'นับสต็อก',`count_${today()}.xlsx`);}

/* INIT */

  showLoading('กำลังโหลดข้อมูลจาก Google Sheets...');
  const ok=await loadAll();
  if(!ok){ document.getElementById('load-sub').textContent='เชื่อมต่อไม่สำเร็จ ตรวจสอบการตั้งค่า Apps Script'; setTimeout(renderLogin,2500); return; }
  renderLogin();
}
init();
